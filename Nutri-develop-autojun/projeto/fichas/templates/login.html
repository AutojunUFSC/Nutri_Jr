{% load static %}
{% load bootstrap %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{% static '/fichas/login.css' %}">
	  <link rel="shortcut icon" href="{% static 'fichas/icone.png' %}" />

    <title>Login</title>

</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light p-3" style="background-color: #5a6269;">
    <a href="{% url 'loginUser' %}" class="navbar-left" menu>
      <img id="logo" src="{% static '/fichas/logo.png' %}" class="img-responsive">
    </a>
    <h1 id="titulo-cabecalho">SISTEMA NUTRI JR</h1>
  </nav>

  <div class="container h-99">
    <div class="d-flex justify-content-center h-100">
      <div class="user_card">
        <div class="d-flex justify-content-center form_container">
          <form method="POST">
            {% csrf_token %}
            <div class="input-group mb-3">
              <strong>{{ form.username|bootstrap }}</strong>
            </div>
            <div class="input-group mb-2">
              <strong>{{ form.password|bootstrap }}</strong>
            </div>

              <div class="d-flex justify-content-center mt-3 login_container">
                <button type="submit" class="btn btn-success">Login</button><br>
            </div>
          </form>
        </div>
        
    
        <div class="mt-4">
          <div class="d-flex justify-content-center links">
            <p>Não tem uma conta?</p> <a href="../registrarMembro" class="ml-1" style="color:rgb(0,0,0);"><strong>Cadastre-se</strong></a>
          </div>
        </div>
        {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
        {% endif %}
      </div>
    </div>
  </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
